name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # Step 2: Set up Node.js with the correct version
      - name: Install Node.js and npm
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "yarn"
          cache-dependency-path: "yarn.lock"

      # Step 3: Install dependencies using Yarn
      - name: Install dependencies 🔧
        run: yarn install

      # Step 4: Build the project
      - name: Build 🚀
        run: yarn build

      # GitHub Pages runs Jekyll by default and skips folders named `_next`,
      # which breaks Next.js static assets (CSS/JS). Disable Jekyll.
      - name: Ensure Jekyll is disabled for Pages
        run: touch out/.nojekyll

      # Step 5: Deploy to GitHub Pages
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: out
          token: ${{ secrets.GITHUB_TOKEN }}
          clean: true
